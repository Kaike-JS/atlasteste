<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Finance — Alistamento</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="preloader">
        <div class="preloader-content">
            <div class="logo-compass preloader-icon" style="font-size: 3rem;">🧭</div>
            <h1 class="shimmer-text">ATLAS FINANCE</h1>
        </div>
    </div>

    <div class="login-wrapper" role="main">
        <div class="login-card" style="border-top-color: #2a9d8f;" aria-label="Formulário de cadastro">

            <div class="logo-compass" style="filter: hue-rotate(50deg);" aria-hidden="true">⚓</div>
            <h1 class="login-title">Alistamento</h1>
            <p class="login-subtitle">Crie suas credenciais para abrir um novo diário de bordo</p>

            <form id="cadastro-form">
                <div class="input-group">
                    <label for="cadastro-nome">Seu Nome (Como quer ser chamado)</label>
                    <input type="text" id="cadastro-nome" placeholder="Ex: Capitão Kaike" required>
                </div>

                <div class="input-group">
                    <label for="cadastro-email">Seu E-mail Real</label>
                    <input type="email" id="cadastro-email" placeholder="exemplo@gmail.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Chave Secreta (Senha)</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6">
                </div>
                
                <button type="submit" class="btn-submit">Registrar na Frota</button>
                <p class="switch-text">Já possui registro? <a href="index.html">Voltar ao Porto (Login)</a></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cadastro.js"></script>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.classList.add('preloader-hidden');
                    setTimeout(() => preloader.remove(), 600);
                }
            }, 3000);
        });
    </script>
</body>
</html>
